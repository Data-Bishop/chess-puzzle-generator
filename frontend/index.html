<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Puzzle Generator</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .job-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .job-info strong {
            color: #667eea;
        }

        .puzzle-list {
            margin-top: 20px;
        }

        .puzzle-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        #board {
            width: 400px;
            margin: 20px auto;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chess Puzzle Generator</h1>
            <p>Generate personalized chess puzzles from Chess.com games</p>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Submit Job</h2>
                <form id="jobForm">
                    <div class="form-group">
                        <label for="username">Chess.com Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="e.g., hikaru, magnuscarlsen"
                            required
                        >
                    </div>
                    <button type="submit" class="btn" id="submitBtn">
                        Generate Puzzles
                    </button>
                </form>

                <div id="submitStatus" class="status"></div>
            </div>

            <div class="card">
                <h2>Check Job Status</h2>
                <form id="statusForm">
                    <div class="form-group">
                        <label for="jobId">Job ID</label>
                        <input
                            type="text"
                            id="jobId"
                            name="jobId"
                            placeholder="Paste job ID here"
                            required
                        >
                    </div>
                    <button type="submit" class="btn" id="statusBtn">
                        Check Status
                    </button>
                </form>

                <div id="statusResult" class="status"></div>
            </div>
        </div>

        <div class="card" id="puzzlesCard" style="display: none;">
            <h2>Generated Puzzles</h2>
            <div id="puzzlesList" class="puzzle-list"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000';

        // Submit job form
        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('submitStatus');

            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Submitting...';
            statusDiv.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/jobs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username }),
                });

                const data = await response.json();

                if (response.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.style.display = 'block';
                    statusDiv.innerHTML = `
                        <strong>Job Created Successfully!</strong><br>
                        <div class="job-info">
                            <strong>Job ID:</strong> ${data.id}<br>
                            <strong>Status:</strong> ${data.status}<br>
                            <strong>Username:</strong> ${data.username}<br>
                            <strong>Created:</strong> ${new Date(data.created_at).toLocaleString()}
                        </div>
                        <p style="margin-top: 10px;">Copy the Job ID to check status or view puzzles later.</p>
                    `;

                    // Auto-fill job ID in status form
                    document.getElementById('jobId').value = data.id;

                    // Reset form
                    e.target.reset();
                } else {
                    throw new Error(data.detail || 'Failed to create job');
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Generate Puzzles';
            }
        });

        // Check status form
        document.getElementById('statusForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const jobId = document.getElementById('jobId').value.trim();
            const statusBtn = document.getElementById('statusBtn');
            const statusDiv = document.getElementById('statusResult');
            const puzzlesCard = document.getElementById('puzzlesCard');

            // Disable button and show loading
            statusBtn.disabled = true;
            statusBtn.innerHTML = '<span class="loading"></span> Checking...';
            statusDiv.style.display = 'none';
            puzzlesCard.style.display = 'none';

            try {
                // Get job status
                const jobResponse = await fetch(`${API_BASE}/jobs/${jobId}`);
                const jobData = await jobResponse.json();

                if (!jobResponse.ok) {
                    throw new Error(jobData.detail || 'Failed to fetch job');
                }

                // Get puzzles
                const puzzlesResponse = await fetch(`${API_BASE}/jobs/${jobId}/puzzles`);
                const puzzlesData = await puzzlesResponse.json();

                // Display job status
                statusDiv.className = 'status info';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = `
                    <strong>Job Status</strong><br>
                    <div class="job-info">
                        <strong>Status:</strong> ${jobData.status}<br>
                        <strong>Username:</strong> ${jobData.username}<br>
                        <strong>Total Games:</strong> ${jobData.total_games}<br>
                        <strong>Total Puzzles:</strong> ${jobData.total_puzzles}<br>
                        <strong>Created:</strong> ${new Date(jobData.created_at).toLocaleString()}<br>
                        ${jobData.error_message ? `<strong style="color: red;">Error:</strong> ${jobData.error_message}<br>` : ''}
                    </div>
                `;

                // Display puzzles
                if (puzzlesData.total > 0) {
                    puzzlesCard.style.display = 'block';
                    const puzzlesList = document.getElementById('puzzlesList');
                    puzzlesList.innerHTML = puzzlesData.puzzles.map((puzzle, index) => `
                        <div class="puzzle-item">
                            <strong>Puzzle ${index + 1}</strong><br>
                            <strong>FEN:</strong> ${puzzle.fen}<br>
                            <strong>Solution:</strong> ${puzzle.solution.join(', ')}<br>
                            ${puzzle.theme ? `<strong>Theme:</strong> ${puzzle.theme}<br>` : ''}
                            ${puzzle.rating ? `<strong>Rating:</strong> ${puzzle.rating}<br>` : ''}
                        </div>
                    `).join('');
                } else {
                    puzzlesCard.style.display = 'block';
                    document.getElementById('puzzlesList').innerHTML =
                        '<p style="color: #666;">No puzzles generated yet. Check back when the job is completed.</p>';
                }

            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.style.display = 'block';
                statusDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
            } finally {
                statusBtn.disabled = false;
                statusBtn.innerHTML = 'Check Status';
            }
        });
    </script>
</body>
</html>
