<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Puzzle Generator</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-warning {
            background: #ffc107;
            color: #333;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 14px;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .hidden {
            display: none !important;
        }

        .job-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
        }

        .job-info strong {
            color: #667eea;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Puzzle Solver Styles */
        .puzzle-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .puzzle-container {
                grid-template-columns: 1fr;
            }
        }

        .board-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #board {
            width: 100%;
            max-width: 450px;
        }

        .turn-indicator {
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
        }

        .turn-indicator.white {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #333;
        }

        .turn-indicator.black {
            background: #333;
            color: #fff;
        }

        .puzzle-info {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .puzzle-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .meta-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .meta-badge.theme {
            background: #e3f2fd;
            color: #1976d2;
        }

        .meta-badge.rating {
            background: #fff3e0;
            color: #e65100;
        }

        .feedback {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
            text-align: center;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
        }

        .feedback.complete {
            background: #d1ecf1;
            color: #0c5460;
        }

        .move-history {
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 8px;
            min-height: 40px;
        }

        .move-history span {
            display: inline-block;
            padding: 3px 8px;
            margin: 2px;
            background: #e9ecef;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
        }

        .move-history span.correct {
            background: #d4edda;
            color: #155724;
        }

        .move-history span.incorrect {
            background: #f8d7da;
            color: #721c24;
            text-decoration: line-through;
        }

        .puzzle-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .puzzle-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .puzzle-counter {
            font-weight: 600;
            color: #667eea;
        }

        .puzzle-list-compact {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .puzzle-list-item {
            padding: 10px 15px;
            margin-bottom: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .puzzle-list-item:hover {
            background: #e9ecef;
        }

        .puzzle-list-item.active {
            background: #667eea;
            color: white;
        }

        .puzzle-list-item.solved {
            border-left: 4px solid #28a745;
        }

        .game-link {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
        }

        .game-link:hover {
            text-decoration: underline;
        }

        /* Progress bar */
        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chess Puzzle Generator</h1>
            <p>Generate personalized chess puzzles from Chess.com games</p>
        </div>

        <!-- Job Submission Section -->
        <div class="grid" id="jobSection">
            <div class="card">
                <h2>Generate Puzzles</h2>
                <form id="jobForm">
                    <div class="form-group">
                        <label for="username">Chess.com Username</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="e.g., hikaru, magnuscarlsen"
                            required
                        >
                    </div>
                    <button type="submit" class="btn" id="submitBtn">
                        Generate Puzzles
                    </button>
                </form>

                <div id="submitStatus" class="status hidden"></div>
            </div>

            <div class="card">
                <h2>Load Existing Job</h2>
                <form id="statusForm">
                    <div class="form-group">
                        <label for="jobId">Job ID</label>
                        <input
                            type="text"
                            id="jobId"
                            name="jobId"
                            placeholder="Paste job ID here"
                            required
                        >
                    </div>
                    <button type="submit" class="btn" id="statusBtn">
                        Load Puzzles
                    </button>
                </form>

                <div id="statusResult" class="status hidden"></div>
            </div>
        </div>

        <!-- Puzzle Solver Section -->
        <div class="card hidden" id="puzzleSolverCard">
            <div class="puzzle-nav">
                <button class="btn btn-secondary btn-sm" id="backToJobsBtn">
                    &larr; Back
                </button>
                <span class="puzzle-counter" id="puzzleCounter">Puzzle 1 of 20</span>
                <div>
                    <button class="btn btn-sm" id="prevPuzzleBtn" disabled>&larr; Previous</button>
                    <button class="btn btn-sm" id="nextPuzzleBtn">Next &rarr;</button>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
            </div>

            <div class="puzzle-container">
                <div class="board-section">
                    <div id="board"></div>
                    <div class="turn-indicator white" id="turnIndicator">White to move</div>
                </div>

                <div class="puzzle-info">
                    <div class="puzzle-meta">
                        <span class="meta-badge theme" id="puzzleTheme">Tactic</span>
                        <span class="meta-badge rating" id="puzzleRating">Rating: 1200</span>
                    </div>

                    <div id="puzzleFeedback" class="feedback hidden"></div>

                    <div>
                        <strong>Your moves:</strong>
                        <div class="move-history" id="moveHistory"></div>
                    </div>

                    <div class="puzzle-controls">
                        <button class="btn btn-warning btn-sm" id="hintBtn">Show Hint</button>
                        <button class="btn btn-secondary btn-sm" id="solutionBtn">Show Solution</button>
                        <button class="btn btn-sm" id="resetPuzzleBtn">Reset Puzzle</button>
                    </div>

                    <div id="gameLink" class="hidden" style="margin-top: 15px;">
                        <a href="#" class="game-link" target="_blank" id="gameLinkAnchor">
                            View original game on Chess.com &rarr;
                        </a>
                    </div>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <h3>All Puzzles</h3>
                <div class="puzzle-list-compact" id="puzzleListCompact"></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8000';

        // State
        let puzzles = [];
        let currentPuzzleIndex = 0;
        let currentMoveIndex = 0;
        let board = null;
        let game = null;
        let solvedPuzzles = new Set();
        let currentJobId = null;

        // Initialize chessboard
        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                onDragStart: onDragStart,
                onDrop: onDrop,
                onSnapEnd: onSnapEnd,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('board', config);
            $(window).resize(() => board.resize());
        }

        // Drag start - only allow dragging if it's user's turn
        function onDragStart(source, piece, position, orientation) {
            if (!game || game.game_over()) return false;

            const currentPuzzle = puzzles[currentPuzzleIndex];
            if (!currentPuzzle) return false;

            // Check if puzzle is already solved
            if (currentMoveIndex >= currentPuzzle.solution.length) return false;

            // Only allow moving pieces of the side to move
            const turn = game.turn();
            if ((turn === 'w' && piece.search(/^b/) !== -1) ||
                (turn === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }

            return true;
        }

        // Handle piece drop
        function onDrop(source, target) {
            const currentPuzzle = puzzles[currentPuzzleIndex];
            if (!currentPuzzle) return 'snapback';

            // Try to make the move
            const move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Always promote to queen for simplicity
            });

            if (move === null) return 'snapback';

            // Check if move is correct
            const expectedMove = currentPuzzle.solution[currentMoveIndex];
            const userMove = move.from + move.to + (move.promotion || '');

            if (userMove === expectedMove || (userMove.slice(0, 4) === expectedMove.slice(0, 4))) {
                // Correct move
                addMoveToHistory(move.san, true);
                currentMoveIndex++;

                if (currentMoveIndex >= currentPuzzle.solution.length) {
                    // Puzzle solved!
                    showFeedback('Puzzle Complete! Well done!', 'complete');
                    solvedPuzzles.add(currentPuzzleIndex);
                    updatePuzzleList();
                    updateProgress();
                } else {
                    showFeedback('Correct!', 'correct');

                    // Make opponent's response after a delay
                    setTimeout(() => {
                        makeOpponentMove();
                    }, 500);
                }
            } else {
                // Incorrect move - undo it
                game.undo();
                addMoveToHistory(move.san, false);
                showFeedback('Incorrect. Try again!', 'incorrect');
                return 'snapback';
            }
        }

        function onSnapEnd() {
            board.position(game.fen());
        }

        // Make opponent's move (from solution)
        function makeOpponentMove() {
            const currentPuzzle = puzzles[currentPuzzleIndex];
            if (currentMoveIndex >= currentPuzzle.solution.length) return;

            const opponentMove = currentPuzzle.solution[currentMoveIndex];
            const from = opponentMove.slice(0, 2);
            const to = opponentMove.slice(2, 4);
            const promotion = opponentMove.length > 4 ? opponentMove[4] : undefined;

            const move = game.move({ from, to, promotion });
            if (move) {
                board.position(game.fen());
                addMoveToHistory(move.san, true, true);
                currentMoveIndex++;
                updateTurnIndicator();
                hideFeedback();
            }
        }

        // Load a puzzle
        function loadPuzzle(index) {
            if (index < 0 || index >= puzzles.length) return;

            currentPuzzleIndex = index;
            currentMoveIndex = 0;
            const puzzle = puzzles[index];

            // Initialize chess.js with FEN
            game = new Chess(puzzle.fen);

            // Set board position and orientation
            const turn = game.turn();
            board.orientation(turn === 'w' ? 'white' : 'black');
            board.position(puzzle.fen);

            // Update UI
            updateTurnIndicator();
            updatePuzzleInfo(puzzle);
            clearMoveHistory();
            hideFeedback();
            updatePuzzleList();
            updateNavButtons();

            document.getElementById('puzzleCounter').textContent =
                `Puzzle ${index + 1} of ${puzzles.length}`;
        }

        function updateTurnIndicator() {
            const indicator = document.getElementById('turnIndicator');
            const turn = game.turn();
            indicator.className = 'turn-indicator ' + (turn === 'w' ? 'white' : 'black');
            indicator.textContent = (turn === 'w' ? 'White' : 'Black') + ' to move';
        }

        function updatePuzzleInfo(puzzle) {
            document.getElementById('puzzleTheme').textContent =
                puzzle.theme ? puzzle.theme.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase()) : 'Tactic';
            document.getElementById('puzzleRating').textContent =
                puzzle.rating ? `Rating: ${puzzle.rating}` : 'Unrated';

            const gameLink = document.getElementById('gameLink');
            const gameLinkAnchor = document.getElementById('gameLinkAnchor');
            if (puzzle.game_url) {
                gameLinkAnchor.href = puzzle.game_url;
                gameLink.classList.remove('hidden');
            } else {
                gameLink.classList.add('hidden');
            }
        }

        function addMoveToHistory(san, correct, isOpponent = false) {
            const history = document.getElementById('moveHistory');
            const span = document.createElement('span');
            span.textContent = san;
            if (!correct) {
                span.className = 'incorrect';
            } else if (correct) {
                span.className = 'correct';
            }
            if (isOpponent) {
                span.style.opacity = '0.7';
            }
            history.appendChild(span);
        }

        function clearMoveHistory() {
            document.getElementById('moveHistory').innerHTML = '';
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('puzzleFeedback');
            feedback.textContent = message;
            feedback.className = 'feedback ' + type;
            feedback.classList.remove('hidden');
        }

        function hideFeedback() {
            document.getElementById('puzzleFeedback').classList.add('hidden');
        }

        function updatePuzzleList() {
            const list = document.getElementById('puzzleListCompact');
            list.innerHTML = puzzles.map((puzzle, i) => {
                const isActive = i === currentPuzzleIndex;
                const isSolved = solvedPuzzles.has(i);
                return `
                    <div class="puzzle-list-item ${isActive ? 'active' : ''} ${isSolved ? 'solved' : ''}"
                         onclick="loadPuzzle(${i})">
                        <span>Puzzle ${i + 1} ${isSolved ? '✓' : ''}</span>
                        <span style="font-size: 12px; opacity: 0.7;">
                            ${puzzle.theme || 'Tactic'} · ${puzzle.rating || '?'}
                        </span>
                    </div>
                `;
            }).join('');
        }

        function updateNavButtons() {
            document.getElementById('prevPuzzleBtn').disabled = currentPuzzleIndex === 0;
            document.getElementById('nextPuzzleBtn').disabled = currentPuzzleIndex >= puzzles.length - 1;
        }

        function updateProgress() {
            const progress = (solvedPuzzles.size / puzzles.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Show hint (highlight the source square)
        function showHint() {
            const currentPuzzle = puzzles[currentPuzzleIndex];
            if (currentMoveIndex >= currentPuzzle.solution.length) return;

            const nextMove = currentPuzzle.solution[currentMoveIndex];
            const from = nextMove.slice(0, 2);

            // Highlight source square
            const squares = document.querySelectorAll('.square-55d63');
            squares.forEach(sq => sq.style.boxShadow = '');

            const sourceSquare = document.querySelector(`.square-${from}`);
            if (sourceSquare) {
                sourceSquare.style.boxShadow = 'inset 0 0 20px 5px rgba(255, 193, 7, 0.8)';
            }

            showFeedback('Hint: Move the highlighted piece', 'warning');
        }

        // Show full solution
        function showSolution() {
            const currentPuzzle = puzzles[currentPuzzleIndex];
            const remainingMoves = currentPuzzle.solution.slice(currentMoveIndex);

            // Play through remaining moves
            function playNextMove(moves) {
                if (moves.length === 0) {
                    showFeedback('Solution shown', 'complete');
                    return;
                }

                const moveUci = moves[0];
                const from = moveUci.slice(0, 2);
                const to = moveUci.slice(2, 4);
                const promotion = moveUci.length > 4 ? moveUci[4] : undefined;

                const move = game.move({ from, to, promotion });
                if (move) {
                    board.position(game.fen());
                    addMoveToHistory(move.san, true);
                    currentMoveIndex++;
                }

                setTimeout(() => playNextMove(moves.slice(1)), 600);
            }

            playNextMove(remainingMoves);
        }

        // Reset current puzzle
        function resetPuzzle() {
            loadPuzzle(currentPuzzleIndex);
        }

        // Load puzzles from API
        async function loadPuzzlesFromJob(jobId) {
            try {
                // Get job status first
                const jobResponse = await fetch(`${API_BASE}/jobs/${jobId}`);
                const jobData = await jobResponse.json();

                if (!jobResponse.ok) {
                    throw new Error(jobData.detail || 'Job not found');
                }

                if (jobData.status !== 'completed') {
                    return {
                        success: false,
                        message: `Job is still ${jobData.status}. Please wait and try again.`,
                        jobData
                    };
                }

                // Get puzzles
                const puzzlesResponse = await fetch(`${API_BASE}/jobs/${jobId}/puzzles`);
                const puzzlesData = await puzzlesResponse.json();

                if (puzzlesData.total === 0) {
                    return {
                        success: false,
                        message: 'No puzzles were generated for this job.',
                        jobData
                    };
                }

                return {
                    success: true,
                    puzzles: puzzlesData.puzzles,
                    jobData
                };

            } catch (error) {
                return {
                    success: false,
                    message: error.message
                };
            }
        }

        // Show puzzle solver
        function showPuzzleSolver(puzzleData, jobId) {
            puzzles = puzzleData;
            currentJobId = jobId;
            solvedPuzzles.clear();

            document.getElementById('jobSection').classList.add('hidden');
            document.getElementById('puzzleSolverCard').classList.remove('hidden');

            loadPuzzle(0);
            updateProgress();
        }

        // Show job section
        function showJobSection() {
            document.getElementById('jobSection').classList.remove('hidden');
            document.getElementById('puzzleSolverCard').classList.add('hidden');
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            initBoard();

            // Submit job form
            document.getElementById('jobForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const submitBtn = document.getElementById('submitBtn');
                const statusDiv = document.getElementById('submitStatus');

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span> Submitting...';
                statusDiv.classList.add('hidden');

                try {
                    const response = await fetch(`${API_BASE}/jobs`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username }),
                    });

                    const data = await response.json();

                    if (response.ok) {
                        statusDiv.className = 'status success';
                        statusDiv.classList.remove('hidden');
                        statusDiv.innerHTML = `
                            <strong>Job Created!</strong>
                            <div class="job-info">
                                <strong>Job ID:</strong> ${data.id}<br>
                                <strong>Status:</strong> ${data.status}
                            </div>
                            <p style="margin-top: 10px;">Puzzles are being generated. This may take a few minutes for large game histories.</p>
                        `;

                        document.getElementById('jobId').value = data.id;

                        // Auto-poll for completion
                        pollJobStatus(data.id);
                    } else {
                        throw new Error(data.detail || 'Failed to create job');
                    }
                } catch (error) {
                    statusDiv.className = 'status error';
                    statusDiv.classList.remove('hidden');
                    statusDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Generate Puzzles';
                }
            });

            // Load puzzles form
            document.getElementById('statusForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const jobId = document.getElementById('jobId').value.trim();
                const statusBtn = document.getElementById('statusBtn');
                const statusDiv = document.getElementById('statusResult');

                statusBtn.disabled = true;
                statusBtn.innerHTML = '<span class="loading"></span> Loading...';
                statusDiv.classList.add('hidden');

                const result = await loadPuzzlesFromJob(jobId);

                if (result.success) {
                    showPuzzleSolver(result.puzzles, jobId);
                } else {
                    statusDiv.className = 'status ' + (result.jobData ? 'info' : 'error');
                    statusDiv.classList.remove('hidden');

                    if (result.jobData) {
                        statusDiv.innerHTML = `
                            <strong>${result.message}</strong>
                            <div class="job-info">
                                <strong>Status:</strong> ${result.jobData.status}<br>
                                <strong>Games:</strong> ${result.jobData.total_games}<br>
                                <strong>Puzzles:</strong> ${result.jobData.total_puzzles}
                                ${result.jobData.error_message ? `<br><strong style="color:red;">Error:</strong> ${result.jobData.error_message}` : ''}
                            </div>
                        `;
                    } else {
                        statusDiv.innerHTML = `<strong>Error:</strong> ${result.message}`;
                    }
                }

                statusBtn.disabled = false;
                statusBtn.innerHTML = 'Load Puzzles';
            });

            // Navigation buttons
            document.getElementById('backToJobsBtn').addEventListener('click', showJobSection);
            document.getElementById('prevPuzzleBtn').addEventListener('click', () => loadPuzzle(currentPuzzleIndex - 1));
            document.getElementById('nextPuzzleBtn').addEventListener('click', () => loadPuzzle(currentPuzzleIndex + 1));

            // Puzzle controls
            document.getElementById('hintBtn').addEventListener('click', showHint);
            document.getElementById('solutionBtn').addEventListener('click', showSolution);
            document.getElementById('resetPuzzleBtn').addEventListener('click', resetPuzzle);
        });

        // Poll job status until complete
        async function pollJobStatus(jobId) {
            const statusDiv = document.getElementById('submitStatus');
            let attempts = 0;
            const maxAttempts = 60; // 5 minutes max

            const poll = async () => {
                attempts++;

                try {
                    const response = await fetch(`${API_BASE}/jobs/${jobId}`);
                    const data = await response.json();

                    if (data.status === 'completed') {
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = `
                            <strong>Puzzles Ready!</strong>
                            <div class="job-info">
                                <strong>Games Analyzed:</strong> ${data.total_games}<br>
                                <strong>Puzzles Generated:</strong> ${data.total_puzzles}
                            </div>
                            <button class="btn btn-sm" style="margin-top: 10px;" onclick="document.getElementById('statusForm').dispatchEvent(new Event('submit'))">
                                Start Solving &rarr;
                            </button>
                        `;
                        return;
                    }

                    if (data.status === 'failed') {
                        statusDiv.className = 'status error';
                        statusDiv.innerHTML = `
                            <strong>Job Failed</strong>
                            <div class="job-info">
                                <strong>Error:</strong> ${data.error_message || 'Unknown error'}
                            </div>
                        `;
                        return;
                    }

                    // Still processing
                    statusDiv.innerHTML = `
                        <strong>Processing...</strong>
                        <div class="job-info">
                            <strong>Status:</strong> ${data.status}<br>
                            <strong>Games Found:</strong> ${data.total_games}
                        </div>
                        <p style="margin-top: 10px;">This may take a few minutes. Page will auto-update.</p>
                    `;

                    if (attempts < maxAttempts) {
                        setTimeout(poll, 5000); // Poll every 5 seconds
                    }

                } catch (error) {
                    console.error('Poll error:', error);
                    if (attempts < maxAttempts) {
                        setTimeout(poll, 5000);
                    }
                }
            };

            setTimeout(poll, 3000); // Start polling after 3 seconds
        }
    </script>
</body>
