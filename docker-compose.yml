services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-databishop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-databishop}
      POSTGRES_DB: ${POSTGRES_DB:-chess_puzzles}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-databishop}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-databishop}:${POSTGRES_PASSWORD:-databishop}@postgres:5432/${POSTGRES_DB:-chess_puzzles}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-development}
      WORKER_MODE: ${WORKER_MODE:-local}
      LAMBDA_SECRET: ${LAMBDA_SECRET:-}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
      LAMBDA_ETL_ARN: ${LAMBDA_ETL_ARN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network

  # Game Extraction Worker (with Stockfish) — only used in local worker mode
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-databishop}:${POSTGRES_PASSWORD:-databishop}@postgres:5432/${POSTGRES_DB:-chess_puzzles}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: 1
      STOCKFISH_PATH: /usr/games/stockfish
      WORKER_MODE: ${WORKER_MODE:-local}
    volumes:
      - ./backend/app:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - backend_network

volumes:
  postgres_data:
  redis_data:

networks:
  backend_network:
    driver: bridge
